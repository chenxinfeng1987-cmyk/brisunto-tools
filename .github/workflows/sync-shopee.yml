name: Shopee Daily Sync

on:
  schedule:
    - cron: "30 8 * * *"       # 16:30 Beijing
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install requests
      - run: python scripts/gh_sync.py
        env:
          PA_USER: ${{ secrets.PA_USER }}
          PA_API_TOKEN: ${{ secrets.PA_API_TOKEN }}
